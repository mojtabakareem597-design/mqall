<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>محرك البحث العلمي المتقدم</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            background: #0f0c29;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 40%, rgba(102, 126, 234, 0.15) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 60%, rgba(118, 75, 162, 0.15) 0%, transparent 60%),
                        radial-gradient(ellipse at 50% 80%, rgba(237, 70, 120, 0.08) 0%, transparent 50%);
            z-index: 0;
            animation: bgFloat 25s ease-in-out infinite alternate;
        }
        @keyframes bgFloat {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            100% { transform: translate(2%, 3%) scale(1.05) rotate(3deg); }
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 48px;
            padding: 30px 35px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.06);
            position: relative;
            z-index: 1;
            transition: all 0.4s ease;
        }

        .header {
            text-align: center;
            padding-bottom: 25px;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            position: relative;
        }
        .header::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2, #ed4678);
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.3);
        }
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .logo-icon {
            font-size: 2.8rem;
            color: #fff;
            background: linear-gradient(135deg, #667eea, #764ba2);
            width: 70px;
            height: 70px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.3);
            animation: pulseGlow 3s ease-in-out infinite;
        }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 8px 30px rgba(102, 126, 234, 0.3); }
            50% { box-shadow: 0 8px 50px rgba(102, 126, 234, 0.6); }
        }
        .logo-text {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 0%, #c8d6e5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }
        .logo-text small {
            font-size: 1rem;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-right: 8px;
        }
        .subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 1rem;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .subtitle .badge {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.2));
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .api-status {
            background: rgba(46, 204, 113, 0.08);
            border: 1px solid rgba(46, 204, 113, 0.15);
            border-radius: 20px;
            padding: 12px 22px;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            backdrop-filter: blur(10px);
        }
        .api-status .status-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .api-status .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #2ecc71;
            display: inline-block;
            animation: pulseDot 2s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.3);
        }
        @keyframes pulseDot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.8); }
        }
        .api-status .status-text {
            color: rgba(255, 255, 255, 0.8);
            font-weight: 600;
            font-size: 0.95rem;
        }
        .api-status .status-details {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
        }
        .api-status .status-right {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .api-status .status-item {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 3px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 500;
        }

        .search-section {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 28px;
            padding: 28px 30px;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }
        .search-section:hover {
            border-color: rgba(102, 126, 234, 0.2);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        .search-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 18px;
        }
        .search-grid .full-width { grid-column: 1 / -1; }
        .search-grid .half-width { grid-column: span 2; }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .form-group label {
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .form-group label .label-icon {
            color: #667eea;
            font-size: 1rem;
        }
        .form-group label .label-hint {
            font-weight: 400;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.3);
        }
        .form-group input {
            padding: 14px 18px;
            border: 2px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
            outline: none;
            font-weight: 500;
            backdrop-filter: blur(10px);
        }
        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.25);
            font-weight: 400;
        }
        .form-group input:focus {
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.12);
        }
        .form-group input.keyword-input {
            border-color: rgba(118, 75, 162, 0.2);
        }
        .form-group input.keyword-input:focus {
            border-color: #764ba2;
            box-shadow: 0 0 0 4px rgba(118, 75, 162, 0.15);
        }
        .keyword-hint {
            font-size: 0.75rem;
            color: rgba(118, 75, 162, 0.6);
            background: rgba(118, 75, 162, 0.08);
            padding: 4px 14px;
            border-radius: 40px;
            display: inline-block;
            margin-top: 4px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            padding: 16px 30px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.3);
            width: 100%;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: left 0.6s ease;
        }
        .btn-primary:hover::before { left: 100%; }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(102, 126, 234, 0.45);
        }
        .btn-primary:active { transform: scale(0.97); }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-pdf-scihub {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: #fff;
            border: none;
            padding: 6px 18px;
            border-radius: 30px;
            font-weight: 600;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            font-size: 0.85rem;
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.25);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
        }
        .btn-pdf-scihub:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(231, 76, 60, 0.4);
        }
        .btn-pdf-scihub:active { transform: scale(0.95); }

        .results-section {
            margin: 25px 0;
        }
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 22px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .results-count {
            color: rgba(255, 255, 255, 0.7);
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .results-count .count-number {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 0 14px;
            border-radius: 30px;
            font-size: 0.9rem;
            color: #fff;
        }
        .results-grid {
            display: grid;
            gap: 16px;
            max-height: 750px;
            overflow-y: auto;
            padding: 3px;
        }
        .results-grid::-webkit-scrollbar {
            width: 6px;
        }
        .results-grid::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
        }
        .results-grid::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
        }

        .article-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 20px 24px;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
            overflow: hidden;
            cursor: default;
        }
        .article-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2, #ed4678);
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .article-card:hover {
            border-color: rgba(102, 126, 234, 0.25);
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }
        .article-card:hover::before { opacity: 1; }
        .article-card .match-badge {
            position: absolute;
            top: 12px;
            left: 16px;
            padding: 2px 14px;
            border-radius: 30px;
            font-size: 0.6rem;
            font-weight: 700;
            background: rgba(46, 204, 113, 0.15);
            color: #2ecc71;
            border: 1px solid rgba(46, 204, 113, 0.15);
            backdrop-filter: blur(10px);
            letter-spacing: 0.5px;
        }
        .article-title {
            font-weight: 700;
            color: #fff;
            font-size: 1.05rem;
            line-height: 1.6;
            padding-left: 80px;
        }
        .article-title .keyword-highlight {
            background: linear-gradient(135deg, rgba(118, 75, 162, 0.25), rgba(102, 126, 234, 0.25));
            padding: 0 6px;
            border-radius: 6px;
            color: #c8b6ff;
            border: 1px solid rgba(118, 75, 162, 0.15);
            font-weight: 800;
        }
        .article-url {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
            word-break: break-all;
        }
        .article-url a {
            color: #667eea;
            text-decoration: none;
            border-bottom: 1px dashed rgba(102, 126, 234, 0.2);
            transition: all 0.3s ease;
        }
        .article-url a:hover {
            color: #a78bfa;
            border-bottom-color: #667eea;
        }
        .article-meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
        }
        .article-meta .meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(255, 255, 255, 0.04);
            padding: 2px 14px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .article-meta .meta-item .meta-icon { font-size: 0.8rem; }
        .article-source {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.12), rgba(118, 75, 162, 0.12));
            padding: 2px 14px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.75rem;
            color: #a78bfa;
            border: 1px solid rgba(102, 126, 234, 0.08);
        }
        .article-doi {
            background: rgba(255, 152, 0, 0.08);
            padding: 2px 14px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.75rem;
            color: #ffb74d;
            direction: ltr;
            font-family: 'Courier New', monospace;
            border: 1px solid rgba(255, 152, 0, 0.08);
        }
        .doi-link {
            color: #ffb74d;
            text-decoration: underline;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .doi-link:hover {
            color: #ffcc80;
            text-shadow: 0 0 20px rgba(255, 152, 0, 0.2);
        }
        .article-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 4px;
        }

        .loading-spinner {
            display: inline-block;
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: rgba(255, 255, 255, 0.3);
        }
        .empty-state .empty-icon { font-size: 4rem; display: block; margin-bottom: 12px; opacity: 0.5; }
        .empty-state .empty-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 8px;
        }
        .empty-state .empty-desc {
            color: rgba(255, 255, 255, 0.25);
            font-size: 0.95rem;
            max-width: 400px;
            margin: 0 auto;
        }

        .error-message {
            background: rgba(198, 40, 40, 0.08);
            border: 1px solid rgba(198, 40, 40, 0.15);
            color: #ef5350;
            padding: 18px 22px;
            border-radius: 20px;
            margin: 10px 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .error-message .error-icon { font-size: 2rem; }
        .error-message .error-details {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.4);
            background: rgba(0,0,0,0.2);
            padding: 4px 12px;
            border-radius: 8px;
        }
        .error-message .retry-btn {
            background: rgba(198, 40, 40, 0.15);
            color: #ef5350;
            border: 1px solid rgba(198, 40, 40, 0.15);
            padding: 6px 22px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
            align-self: flex-start;
        }
        .error-message .retry-btn:hover {
            background: rgba(198, 40, 40, 0.25);
            transform: scale(1.05);
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            margin: 6px 0;
            overflow: hidden;
        }
        .progress-bar .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2, #ed4678);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
        }
        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 4px;
        }

        .warning-box {
            background: rgba(255, 152, 0, 0.06);
            border: 1px solid rgba(255, 152, 0, 0.1);
            padding: 10px 18px;
            border-radius: 14px;
            margin: 6px 0;
            color: #ffb74d;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }
        .success-box {
            background: rgba(46, 204, 113, 0.06);
            border: 1px solid rgba(46, 204, 113, 0.1);
            padding: 10px 18px;
            border-radius: 14px;
            margin: 6px 0;
            color: #66bb6a;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }

        @media (max-width: 992px) {
            .search-grid { grid-template-columns: 1fr 1fr; }
            .search-grid .full-width { grid-column: 1 / -1; }
            .search-grid .half-width { grid-column: span 1; }
        }
        @media (max-width: 768px) {
            body { padding: 12px; }
            .container { padding: 18px 16px; border-radius: 32px; }
            .logo-text { font-size: 1.6rem; }
            .logo-icon { width: 56px; height: 56px; font-size: 2.2rem; }
            .search-grid { grid-template-columns: 1fr; }
            .search-grid .half-width { grid-column: 1; }
            .search-section { padding: 18px; }
            .article-card { padding: 16px 18px; }
            .article-title { padding-left: 0; }
            .article-card .match-badge {
                position: static;
                display: inline-block;
                margin-bottom: 6px;
            }
            .results-header { flex-direction: column; align-items: flex-start; }
            .api-status { flex-direction: column; align-items: stretch; }
        }
        @media (max-width: 480px) {
            .container { padding: 12px; border-radius: 24px; }
            .logo-text { font-size: 1.3rem; }
            .logo-icon { width: 44px; height: 44px; font-size: 1.8rem; }
            .form-group input { padding: 12px 14px; font-size: 0.9rem; }
            .btn-primary { padding: 14px 20px; font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- HEADER -->
    <div class="header">
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
            <div class="logo-text">
                محرك البحث العلمي
                <small>AI</small>
            </div>
        </div>
        <div class="subtitle">
            <span><i class="fas fa-search" style="color:#667eea;"></i> بحث في 50 قاعدة بيانات</span>
            <span class="badge"><i class="fas fa-check-circle"></i> جميع الكلمات المفتاحية</span>
            <span class="badge" style="background: linear-gradient(135deg, rgba(231,76,60,0.15), rgba(192,57,43,0.15)); border-color: rgba(231,76,60,0.1);">
                <i class="fas fa-file-pdf"></i> PDF مباشر
            </span>
        </div>
    </div>

    <!-- API STATUS -->
    <div class="api-status">
        <div class="status-left">
            <span class="dot"></span>
            <span class="status-text"><i class="fas fa-plug"></i> متصل</span>
            <span class="status-details">| Crossref · 50 مصدراً</span>
        </div>
        <div class="status-right">
            <span class="status-item"><i class="fas fa-database"></i> 150M+</span>
            <span class="status-item"><i class="fas fa-bullseye"></i> دقة عالية</span>
        </div>
    </div>

    <!-- SEARCH -->
    <div class="search-section">
        <div class="search-grid">
            <div class="form-group full-width">
                <label>
                    <span class="label-icon"><i class="fas fa-heading"></i></span>
                    الموضوع (اختياري)
                    <span class="label-hint">(يساعد في تضييق البحث)</span>
                </label>
                <input type="text" id="topicInput" placeholder="مثال: deep learning">
            </div>
            <div class="form-group full-width">
                <label>
                    <span class="label-icon"><i class="fas fa-key"></i></span>
                    الكلمات المفتاحية (إلزامية)
                    <span class="label-hint">(يجب أن تظهر جميعها في العنوان)</span>
                </label>
                <input type="text" id="keywordsInput" class="keyword-input" placeholder="مثال: neural networks">
                <span class="keyword-hint"><i class="fas fa-exclamation-triangle"></i> سيتم عرض المقالات التي تحتوي على <strong>جميع</strong> هذه الكلمات في عنوانها</span>
            </div>
            <div class="form-group">
                <label><span class="label-icon"><i class="fas fa-calendar-alt"></i></span> من سنة</label>
                <input type="number" id="yearFrom" placeholder="مثال: 2000" min="1900" max="2026">
            </div>
            <div class="form-group">
                <label><span class="label-icon"><i class="fas fa-calendar-alt"></i></span> إلى سنة</label>
                <input type="number" id="yearTo" placeholder="مثال: 2025" min="1900" max="2026">
            </div>
            <div class="form-group">
                <label>
                    <span class="label-icon"><i class="fas fa-list-ol"></i></span>
                    العدد المطلوب
                    <span class="label-hint">(0 = جميع المطابقات)</span>
                </label>
                <input type="number" id="desiredCount" placeholder="مثال: 100" value="100" min="0" max="10000">
            </div>
            <div class="form-group full-width">
                <button class="btn-primary" id="searchBtn">
                    <i class="fas fa-rocket"></i> بحث
                </button>
            </div>
        </div>
    </div>

    <!-- RESULTS -->
    <div class="results-section" id="resultsSection">
        <div class="results-header">
            <div class="results-count">
                <i class="fas fa-chart-bar"></i> عدد المقالات
                <span class="count-number" id="resultsCount">0</span>
            </div>
            <div style="font-size:0.8rem; color:rgba(255,255,255,0.3);">
                <i class="fas fa-check-circle" style="color:#764ba2;"></i> جميعها تحتوي على الكلمات
            </div>
        </div>
        <div id="progressContainer" style="display:none; margin-bottom:12px;">
            <div class="progress-info">
                <span id="progressStatus"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</span>
                <span id="progressText">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
        <div id="messageContainer"></div>
        <div class="results-grid" id="resultsGrid">
            <div class="empty-state">
                <span class="empty-icon"><i class="fas fa-microscope"></i></span>
                <div class="empty-title">أدخل الكلمات المفتاحية</div>
                <div class="empty-desc">سيتم عرض المقالات مع رابط وزر PDF</div>
            </div>
        </div>
    </div>

    <!-- زر PDF الرئيسي تم إزالته -->
</div>

<script>
    (function() {
        // عناصر DOM
        const topicInput = document.getElementById('topicInput');
        const keywordsInput = document.getElementById('keywordsInput');
        const yearFrom = document.getElementById('yearFrom');
        const yearTo = document.getElementById('yearTo');
        const desiredCountInput = document.getElementById('desiredCount');
        const searchBtn = document.getElementById('searchBtn');
        const resultsGrid = document.getElementById('resultsGrid');
        const resultsCount = document.getElementById('resultsCount');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const progressStatus = document.getElementById('progressStatus');
        const messageContainer = document.getElementById('messageContainer');

        // ===== قائمة المصادر (50) =====
        const SOURCE_MAP = [
            { name: 'Google Scholar', keywords: ['google scholar'] },
            { name: 'Scopus', keywords: ['scopus'] },
            { name: 'Web of Science', keywords: ['web of science', 'clarivate'] },
            { name: 'PubMed', keywords: ['pubmed', 'pubmed central', 'pmc', 'medline', 'nlm'] },
            { name: 'ScienceDirect', keywords: ['sciencedirect', 'elsevier'] },
            { name: 'SpringerLink', keywords: ['springer'] },
            { name: 'Wiley Online Library', keywords: ['wiley'] },
            { name: 'IEEE Xplore', keywords: ['ieee'] },
            { name: 'JSTOR', keywords: ['jstor'] },
            { name: 'Semantic Scholar', keywords: ['semantic scholar'] },
            { name: 'Taylor & Francis Online', keywords: ['taylor & francis', 'tandf'] },
            { name: 'Nature Portfolio', keywords: ['nature publishing', 'nature portfolio', 'nature.com'] },
            { name: 'DOAJ', keywords: ['doaj'] },
            { name: 'MDPI', keywords: ['mdpi'] },
            { name: 'PLOS', keywords: ['plos'] },
            { name: 'Oxford Academic', keywords: ['oxford', 'oup'] },
            { name: 'Cambridge Core', keywords: ['cambridge'] },
            { name: 'SAGE Journals', keywords: ['sage'] },
            { name: 'Elsevier', keywords: ['elsevier'] },
            { name: 'Cell Press', keywords: ['cell', 'cell press'] },
            { name: 'BMJ Journals', keywords: ['bmj', 'british medical journal'] },
            { name: 'The Lancet', keywords: ['lancet'] },
            { name: 'Cochrane Library', keywords: ['cochrane'] },
            { name: 'ERIC', keywords: ['eric'] },
            { name: 'CORE', keywords: ['core'] },
            { name: 'BASE', keywords: ['base'] },
            { name: 'OpenAlex', keywords: ['openalex'] },
            { name: 'ResearchGate', keywords: ['researchgate'] },
            { name: 'Academia.edu', keywords: ['academia'] },
            { name: 'SSRN', keywords: ['ssrn'] },
            { name: 'arXiv', keywords: ['arxiv'] },
            { name: 'bioRxiv', keywords: ['biorxiv'] },
            { name: 'medRxiv', keywords: ['medrxiv'] },
            { name: 'DOAB', keywords: ['doab'] },
            { name: 'OATD', keywords: ['oatd'] },
            { name: 'Zenodo', keywords: ['zenodo'] },
            { name: 'Figshare', keywords: ['figshare'] },
            { name: 'Europe PMC', keywords: ['europe pmc'] },
            { name: 'PubMed Central (PMC)', keywords: ['pubmed central', 'pmc'] },
            { name: 'Hindawi', keywords: ['hindawi'] },
            { name: 'Frontiers', keywords: ['frontiers'] },
            { name: 'Emerald Insight', keywords: ['emerald'] },
            { name: 'De Gruyter', keywords: ['degruyter', 'de gruyter'] },
            { name: 'SPIE Digital Library', keywords: ['spie'] },
            { name: 'ACM Digital Library', keywords: ['acm'] },
            { name: 'Project MUSE', keywords: ['muse'] },
            { name: 'AGRIS', keywords: ['agris'] },
            { name: 'RePEc', keywords: ['repec'] },
            { name: 'Dimensions', keywords: ['dimensions'] },
            { name: 'WorldCat', keywords: ['worldcat'] }
        ];

        function detectSource(item) {
            const publisher = (item.publisher || '').toLowerCase();
            const container = (item['container-title'] && item['container-title'][0]) ? item['container-title'][0].toLowerCase() : '';
            const combined = publisher + ' ' + container;
            for (let src of SOURCE_MAP) {
                for (let kw of src.keywords) {
                    if (combined.includes(kw)) {
                        return src.name;
                    }
                }
            }
            if (item.publisher) {
                const pubLower = item.publisher.toLowerCase();
                for (let src of SOURCE_MAP) {
                    for (let kw of src.keywords) {
                        if (pubLower.includes(kw)) {
                            return src.name;
                        }
                    }
                }
            }
            return null;
        }

        function cleanAndValidateDOI(doi) {
            if (!doi) return null;
            let cleaned = doi.trim().split('?')[0].split('#')[0];
            if (!cleaned.startsWith('10.') || !cleaned.includes('/')) return null;
            const parts = cleaned.split('/');
            if (parts.length < 2) return null;
            const prefix = parts[0].replace('10.', '');
            if (!/^\d+$/.test(prefix) || prefix.length < 4) return null;
            return cleaned;
        }

        function openSciHubForDOI(doi) {
            if (!doi) return;
            const cleanDoi = cleanAndValidateDOI(doi);
            if (!cleanDoi) {
                alert('⚠️ هذا DOI غير صالح.');
                return;
            }
            const sciHubUrl = `https://sci-hub.box/${encodeURIComponent(cleanDoi)}`;
            window.open(sciHubUrl, '_blank');
        }
        window.openSciHubForDOI = openSciHubForDOI;

        function delay(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

        // ===== قائمة خوادم البروكسي =====
        const PROXY_LIST = [
            (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
            (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
            (url) => `https://thingproxy.freeboard.io/fetch/${encodeURIComponent(url)}`,
            (url) => `https://cors-anywhere.herokuapp.com/${encodeURIComponent(url)}`
        ];

        async function fetchWithProxy(url, retries = 2, timeout = 20000) {
            // المحاولات المباشرة
            for (let attempt = 0; attempt < retries; attempt++) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), timeout);
                    const response = await fetch(url, {
                        method: 'GET',
                        headers: {
                            'Accept': 'application/json',
                            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
                        },
                        mode: 'cors',
                        credentials: 'omit',
                        signal: controller.signal
                    });
                    clearTimeout(timeoutId);
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    return await response.json();
                } catch (error) {
                    console.warn(`مباشر ${attempt+1} فشل:`, error.message);
                    if (attempt < retries - 1) await delay(1500 * (attempt + 1));
                }
            }

            // البروكسي
            for (let proxyFn of PROXY_LIST) {
                try {
                    const proxyUrl = proxyFn(url);
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), timeout);
                    const response = await fetch(proxyUrl, {
                        method: 'GET',
                        headers: {
                            'Accept': 'application/json',
                            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                        },
                        mode: 'cors',
                        credentials: 'omit',
                        signal: controller.signal
                    });
                    clearTimeout(timeoutId);
                    if (!response.ok) continue;
                    const data = await response.text();
                    try {
                        const parsed = JSON.parse(data);
                        if (parsed.contents) {
                            return JSON.parse(parsed.contents);
                        }
                        return parsed;
                    } catch (e) {
                        if (data.startsWith('{') || data.startsWith('[')) {
                            try { return JSON.parse(data); } catch (e2) {}
                        }
                    }
                } catch (error) {
                    console.warn('بروكسي فشل:', error.message);
                    await delay(1000);
                }
            }
            throw new Error('فشل الاتصال حتى عبر البروكسي. تأكد من اتصالك بالإنترنت.');
        }

        // ===== جلب المقالات =====
        async function fetchArticles(topic, keywords, fromYear, toYear, desiredCount) {
            const keywordList = keywords.trim().split(/\s+/).filter(w => w.length > 2);
            if (keywordList.length === 0) {
                throw new Error('الرجاء إدخال كلمات مفتاحية صحيحة (أكثر من حرفين)');
            }

            const isUnlimited = (desiredCount === 0);
            const targetCount = isUnlimited ? 999999 : desiredCount;
            const searchQuery = topic.trim() || keywords.trim();
            const encodedQuery = encodeURIComponent(searchQuery);
            const rowsPerPage = 100;
            let offset = 0;
            let allMatched = [];
            let totalFetched = 0;
            let hasMore = true;
            let page = 0;
            const maxPages = 200;

            progressContainer.style.display = 'block';
            progressFill.style.width = '0%';
            progressText.textContent = '0%';
            progressStatus.innerHTML = `<i class="fas fa-spinner fa-spin"></i> جاري البحث... (الهدف: ${isUnlimited ? 'جميع المطابقات' : targetCount})`;

            while (hasMore && page < maxPages && allMatched.length < targetCount) {
                const url = `https://api.crossref.org/works?query=${encodedQuery}&filter=from-pub-date:${fromYear},until-pub-date:${toYear}&rows=${rowsPerPage}&offset=${offset}&sort=relevance&order=desc`;

                let data = null;
                try {
                    data = await fetchWithProxy(url, 2, 20000);
                } catch (error) {
                    throw new Error(`فشل جلب البيانات: ${error.message}`);
                }

                if (!data || !data.message || !data.message.items || data.message.items.length === 0) {
                    hasMore = false;
                    break;
                }

                const items = data.message.items;
                totalFetched += items.length;
                const keywordLower = keywordList.map(k => k.toLowerCase());

                const matched = items.filter(item => {
                    const sourceName = detectSource(item);
                    if (!sourceName) return false;
                    const rawDoi = item['DOI'] || '';
                    const validDoi = cleanAndValidateDOI(rawDoi);
                    if (!validDoi) return false;
                    const title = (item.title && item.title[0]) ? item.title[0].toLowerCase() : '';
                    if (!title) return false;
                    return keywordLower.every(kw => title.includes(kw));
                });

                const converted = matched.map(item => {
                    const source = detectSource(item) || 'مصدر معتمد';
                    let year = 'N/A';
                    if (item['issued'] && item['issued']['date-parts'] && item['issued']['date-parts'][0]) {
                        year = item['issued']['date-parts'][0][0] || 'N/A';
                    }
                    let titleDisplay = item.title[0] || 'عنوان غير متوفر';
                    const validDoi = cleanAndValidateDOI(item['DOI']);
                    let journal = (item['container-title'] && item['container-title'][0]) || 'N/A';
                    let articleUrl = item['URL'] || null;
                    if (!articleUrl && validDoi) {
                        articleUrl = `https://doi.org/${encodeURIComponent(validDoi)}`;
                    }
                    return { title: titleDisplay, source, year, doi: validDoi, journal, url: articleUrl };
                });

                allMatched = allMatched.concat(converted);

                const progress = Math.min(((page + 1) / 20) * 100, 95);
                progressFill.style.width = progress + '%';
                progressText.textContent = Math.round(progress) + '%';
                progressStatus.innerHTML = `<i class="fas fa-spinner fa-spin"></i> تم جلب ${totalFetched} مقالة، تم العثور على ${allMatched.length} مطابقة...`;

                if (items.length < rowsPerPage) {
                    hasMore = false;
                } else {
                    offset += rowsPerPage;
                    page++;
                    await delay(300);
                }
            }

            progressContainer.style.display = 'none';

            messageContainer.innerHTML = '';
            if (allMatched.length === 0) {
                messageContainer.innerHTML = `<div class="warning-box"><i class="fas fa-exclamation-triangle warning-icon"></i><div><strong>تنبيه:</strong> لم يتم العثور على مقالات مطابقة. جرب كلمات مفتاحية مختلفة أو وسّع نطاق السنوات.</div></div>`;
            } else if (allMatched.length < targetCount && !isUnlimited) {
                messageContainer.innerHTML = `<div class="warning-box"><i class="fas fa-exclamation-circle warning-icon"></i><div><strong>تنبيه:</strong> تم العثور على ${allMatched.length} مقالة فقط (العدد المطلوب ${targetCount}). قد لا يتوفر عدد كافٍ.</div></div>`;
            } else {
                messageContainer.innerHTML = `<div class="success-box"><i class="fas fa-check-circle success-icon"></i><div><strong>نجاح:</strong> تم العثور على ${allMatched.length} مقالة. يمكنك تحميل PDF بالضغط على زر "PDF".</div></div>`;
            }

            return allMatched;
        }

        // ===== عرض النتائج =====
        function displayArticles(articles) {
            if (!articles || articles.length === 0) {
                resultsGrid.innerHTML = `<div class="empty-state"><span class="empty-icon"><i class="fas fa-frown-open"></i></span><div class="empty-title">لا توجد نتائج</div><div class="empty-desc">لم نجد مقالات مطابقة من المصادر المعتمدة.</div></div>`;
                resultsCount.textContent = '0';
                return;
            }

            resultsCount.textContent = articles.length;
            const keywordWords = keywordsInput.value.trim().split(/\s+/).filter(w => w.length > 2);

            let html = '';
            articles.forEach((article) => {
                let highlightedTitle = article.title;
                keywordWords.forEach(word => {
                    const regex = new RegExp(`(${word})`, 'gi');
                    highlightedTitle = highlightedTitle.replace(regex, '<span class="keyword-highlight">$1</span>');
                });

                const doiValid = article.doi && cleanAndValidateDOI(article.doi) !== null;
                const displayDoi = doiValid ? article.doi : 'غير متوفر';
                const articleUrl = article.url || '#';

                html += `
                    <div class="article-card" data-doi="${article.doi}">
                        <div class="match-badge"><i class="fas fa-check-circle"></i> مصدر معتمد</div>
                        <div class="article-title">${highlightedTitle}</div>
                        <div class="article-url">
                            <i class="fas fa-link"></i> <a href="${articleUrl}" target="_blank" title="فتح المقالة">${articleUrl}</a>
                        </div>
                        <div class="article-meta">
                            <span class="meta-item"><span class="meta-icon"><i class="fas fa-tag"></i></span><span class="article-source">${article.source}</span></span>
                            <span class="meta-item"><span class="meta-icon"><i class="fas fa-calendar-alt"></i></span>${article.year}</span>
                            <span class="meta-item"><span class="meta-icon"><i class="fas fa-book"></i></span>${article.journal}</span>
                            ${doiValid ? `
                                <span class="meta-item article-doi">
                                    <span class="doi-prefix"><i class="fas fa-fingerprint"></i></span>
                                    <a href="#" class="doi-link" onclick="openSciHubForDOI('${displayDoi}'); return false;" title="اضغط لفتح PDF">
                                        ${displayDoi}
                                    </a>
                                </span>
                            ` : `<span class="meta-item" style="background:rgba(198,40,40,0.08); color:#ef5350; border-color:rgba(198,40,40,0.1);"><i class="fas fa-times-circle"></i> DOI غير صالح</span>`}
                        </div>
                        <div class="article-actions">
                            ${doiValid ? `
                                <button class="btn-pdf-scihub" onclick="openSciHubForDOI('${displayDoi}');">
                                    <i class="fas fa-file-pdf"></i> PDF
                                </button>
                            ` : '<span style="color:rgba(255,255,255,0.2); font-size:0.8rem;"><i class="fas fa-ban"></i> لا يوجد DOI</span>'}
                        </div>
                    </div>
                `;
            });

            resultsGrid.innerHTML = html;
        }

        // ===== البحث الرئيسي =====
        async function performSearch() {
            const topic = topicInput.value.trim();
            const keywords = keywordsInput.value.trim();

            if (!keywords) {
                alert('⚠️ الرجاء إدخال الكلمات المفتاحية (إلزامية)');
                return;
            }

            const keywordList = keywords.split(/\s+/).filter(w => w.length > 2);
            if (keywordList.length === 0) {
                alert('⚠️ الكلمات المفتاحية يجب أن تحتوي على أكثر من حرفين');
                return;
            }

            const from = parseInt(yearFrom.value);
            const to = parseInt(yearTo.value);

            if (isNaN(from) || isNaN(to)) {
                alert('⚠️ الرجاء إدخال سنة البداية والنهاية بشكل صحيح');
                return;
            }

            if (from > to) {
                alert('⚠️ السنة الأولى يجب أن تكون أقل من السنة الأخيرة');
                return;
            }

            const desiredCount = parseInt(desiredCountInput.value);
            if (isNaN(desiredCount) || desiredCount < 0) {
                alert('⚠️ الرجاء إدخال عدد صحيح (0 لجلب جميع المطابقات)');
                return;
            }

            searchBtn.disabled = true;
            searchBtn.innerHTML = '<span class="loading-spinner"></span> جاري البحث...';

            resultsGrid.innerHTML = `<div class="empty-state"><span class="empty-icon"><i class="fas fa-spinner fa-spin"></i></span><div class="empty-title">جاري البحث</div><div class="empty-desc">الكلمات: "${keywords}"<br>العدد المطلوب: ${desiredCount === 0 ? 'جميع المطابقات' : desiredCount}</div></div>`;
            messageContainer.innerHTML = '';

            try {
                const articles = await fetchArticles(topic, keywords, from, to, desiredCount);
                displayArticles(articles);
            } catch (error) {
                console.error('Search error:', error);
                let errorMsg = error.message || 'حدث خطأ غير متوقع.';
                let details = '';
                if (errorMsg.includes('Failed to fetch') || errorMsg.includes('NetworkError') || errorMsg.includes('CORS') || errorMsg.includes('فشل الاتصال') || errorMsg.includes('فشل جلب البيانات')) {
                    errorMsg = 'فشل الاتصال بالخادم. قد يكون السبب: ضعف الشبكة، أو حظر الخدمة، أو مشكلة في المتصفح.';
                    details = '💡 تأكد من اتصالك بالإنترنت، وجرب استخدام شبكة Wi-Fi بدلاً من بيانات الهاتف، أو استخدم VPN.';
                } else if (errorMsg.includes('HTTP 400')) {
                    details = 'تأكد من أن الكلمات المفتاحية لا تحتوي على رموز خاصة غير مدعومة.';
                } else if (errorMsg.includes('HTTP 429')) {
                    details = 'لقد أرسلت عدداً كبيراً من الطلبات. انتظر بضع دقائق وحاول مجدداً.';
                }
                resultsGrid.innerHTML = `
                    <div class="error-message">
                        <div style="display:flex; align-items:center; gap:12px;">
                            <span class="error-icon"><i class="fas fa-exclamation-triangle"></i></span>
                            <div>
                                <strong>${errorMsg}</strong>
                                ${details ? `<div class="error-details"><i class="fas fa-lightbulb"></i> ${details}</div>` : ''}
                            </div>
                        </div>
                        <button class="retry-btn" onclick="document.getElementById('searchBtn').click();"><i class="fas fa-redo"></i> إعادة المحاولة</button>
                    </div>
                `;
                resultsCount.textContent = '0';
            } finally {
                searchBtn.disabled = false;
                searchBtn.innerHTML = '<i class="fas fa-rocket"></i> بحث';
                progressContainer.style.display = 'none';
            }
        }

        // ===== أحداث =====
        searchBtn.addEventListener('click', performSearch);
        topicInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); performSearch(); } });
        keywordsInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); performSearch(); } });

        // تم إزالة زر PDF الرئيسي وأحداثه

    })();
</script>

</body>
</html>
